<tui-root [attr.tuiTheme]="darkTheme() ? 'dark' : null">
  <tui-app-bar>
    <span tuiSlot="left">
      <button tuiIconButton [iconStart]="darkTheme() ? '@tui.sun' : '@tui.moon'" (click)="darkTheme.set(!darkTheme())"
        title="Toggle dark mode"></button>
    </span>
    <label tuiFade tuiTitle>
      Diario Disciplinare
    </label>

    @if(appwrite.loggedInUser()) {
    <span tuiSlot="right" title="User">
      <span>{{ appwrite.loggedInUser()?.name }}</span>
      <button iconStart="@tui.log-out" tuiIconButton (click)="logout()">logout</button>
    </span>
    }
  </tui-app-bar>

  @if(appwrite.loggedInUser()) {
  <app-nav></app-nav>
  }

  <router-outlet></router-outlet>
</tui-root>
