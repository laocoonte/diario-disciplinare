<app-calendar-inputs [selectedMonth]="selectedMonth()" [selectedYear]="selectedYear()"
    (monthChange)="onMonthChange($event)" (yearChange)="onYearChange($event)"></app-calendar-inputs>

@if (isTaskLoading()) {
<tui-loader size="m" center></tui-loader>
} @else if (tasks()?.length === 0) {
<div class="no-tasks-message">
    <span>No task created.</span>
</div>
} @else {
<table class="calendar-table" tuiTable>
    <thead>
        <tr>
            <th tuiTh>Day</th>
            @for(task of tasks(); track task) {
            <th tuiTh>
                <div>
                    <span>{{ task.title }}</span>
                    <tui-icon size="s" icon="@tui.info" [tuiTooltip]="task.description"></tui-icon>
                </div>
            </th>
            }
        </tr>
    </thead>
    <tbody tuiTbody>
        @for(row of dataSource(); track row.day) {
        <tr>
            <td tuiTd>{{ row.day }}</td>
            @for(task of row.dailies; track task; let i = $index) {
            <td tuiTd>
                <app-calendar-cell (createDaily)="createDailyHandler(row.day, i)"
                    (updateDaily)="updateDailyHandler($event)" [task]="task" />
            </td>
            }
        </tr>
        }
    </tbody>
</table>
}
