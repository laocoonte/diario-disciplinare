<section>
  <form>
    <tui-textfield>
      <label tuiLabel>Email</label>
      <input name="email" type="email" tuiTextfield placeholder="Email" [(ngModel)]="email" />
    </tui-textfield>
    <tui-textfield>
      <label tuiLabel>Password</label>
      <input name="password" type="password" tuiTextfield placeholder="Password" [(ngModel)]="password" />
    </tui-textfield>


    <button tuiButton type="button" (click)="login(email, password)">
      Login
    </button>
  </form>
</section>
